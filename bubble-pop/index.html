<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop! 🫧</title>
    <!-- Kid-friendly playful font -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background: #87CEEB;
            /* Sky blue fallback */
            overflow: hidden;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #video {
            display: none;
        }

        /* The output showing the camera feed + drawn graphics overlay */
        #output {
            position: absolute;
            transform: scaleX(-1);
            object-fit: cover;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The canvas just for game graphics, layered over the camera */
        #game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            /* Let events pass */
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: auto;
            /* Bisa mendeteksi klik/touch! */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #FFD700;
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 2.5rem;
            color: #FF8C00;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
            animation: bounceIn 1s ease-out;
        }

        .score-board img {
            width: 45px;
            height: 45px;
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), 3px 3px 0 #FF69B4;
            letter-spacing: 2px;
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {

            0%,
            100% {
                transform: translateY(0) rotate(-2deg);
            }

            50% {
                transform: translateY(-10px) rotate(2deg);
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.05);
            }

            70% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Starting overlay to ask user to interact so Audio can start */
        .start-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            pointer-events: auto;
            text-align: center;
            transition: opacity 0.5s;
        }

        .start-btn {
            background: #FF69B4;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 2.5rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #D02B84, 0 15px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 15px;
            pointer-events: auto;
        }

        .start-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #D02B84, 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: none;
            display: none;
            /* hidden initially */
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top-color: #FFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .instruction-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto;
            display: inline-block;
            margin-bottom: 20px;
            pointer-events: none;
            /* Jangan tangkap klik */
        }
    </style>
</head>

<body>

    <div class="start-overlay" id="start-overlay">
        <h1 style="font-size: 5rem; color: #fff; text-shadow: 4px 4px 0 #FF69B4; margin-bottom: 10px;">Bubble Pop! 🫧
        </h1>
        <p style="font-size: 2rem; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); max-width: 600px;">
            Ajaib! Pecahkan gelembung dengan sentuhan jari atau lambaian tanganmu!
        </p>
        <button class="start-btn" id="start-btn">🌟 MULAI MAIN</button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <h2 style="font-size: 2rem; text-shadow: 1px 1px 4px rgba(0,0,0,0.3);" id="loader-status">Kamera sedang
                disiapkan...</h2>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>

    <div class="camera-container">
        <!-- outputs video with mediapipe markings if needed (we'll draw mostly on game-layer) -->
        <canvas id="output"></canvas>
        <!-- outputs game graphics: bubbles, particles, etc that don't flip -->
        <canvas id="game-layer"></canvas>
    </div>

    <div class="ui-layer">
        <div class="top-bar">
            <div class="title">Bubble Pop! 🫧</div>
            <div class="score-board">
                ⭐ <span id="score-text">0</span>
            </div>
        </div>

        <div style="text-align: center; width: 100%;">
            <div class="instruction-box">
                👋 Sentuh layar atau lambaikan tangan untuk memecahkan gelembung!
            </div>
        </div>
    </div>

    <script>
        // --- 1. Audio Setup ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playPopSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Pluck-like pop sound
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- 2. Canvas & Game State Setup ---
        const videoElement = document.getElementById('video');
        const canvasOutput = document.getElementById('output'); // Mirror of video + hands
        const ctxOutput = canvasOutput.getContext('2d');
        const canvasGame = document.getElementById('game-layer'); // Gelembung dll, TIDAK di mirror agar koordinat pas dengan tangan
        const ctxGame = canvasGame.getContext('2d');

        let defaultWidth = 1280;
        let defaultHeight = 720;
        let w = window.innerWidth;
        let h = window.innerHeight;

        let score = 0;
        const scoreText = document.getElementById('score-text');

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvasOutput.width = w;
            canvasOutput.height = h;
            canvasGame.width = w;
            canvasGame.height = h;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 3. Game Classes (Bubbles & Particles) ---
        const bubbles = [];
        const particles = [];

        // Vibrant kid colors
        const colors = [
            'rgba(255, 105, 180, 0.8)', // Hot pink
            'rgba(255, 215, 0, 0.8)',   // Gold
            'rgba(0, 255, 127, 0.8)',   // Spring green
            'rgba(0, 191, 255, 0.8)',   // Deep sky blue
            'rgba(147, 112, 219, 0.8)'  // Medium purple
        ];

        class Bubble {
            constructor() {
                // Balon lebih gede 60 - 140px ukurannya (diameter x2)
                this.radius = Math.random() * 80 + 60;
                this.x = Math.random() * (w - this.radius * 2) + this.radius;
                this.y = h + this.radius + Math.random() * 100;
                this.speedY = Math.random() * 2 + 1.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.wobblePhase = Math.random() * Math.PI * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.popped = false;
            }

            update() {
                this.y -= this.speedY;
                // Wobble effect
                this.wobblePhase += 0.05;
                this.x += Math.sin(this.wobblePhase) * 1.5;

                if (this.y < -this.radius) {
                    this.popped = true; // remove if flies off screen
                }
            }

            draw(ctx) {
                // Outer circle
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
                ctx.stroke();

                // Shine / highlight to make it look like a bubble
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.02;
                this.color = color;
                this.size = Math.random() * 15 + 5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.5; // gravity
                this.life -= this.decay;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                // Draw a nice star or circle
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, color) {
            playPopSound();
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
            // Add score points
            score += 10;
            scoreText.innerText = score;

            // small score pop animation
            scoreText.style.transform = 'scale(1.5)';
            scoreText.style.color = '#fff';
            setTimeout(() => {
                scoreText.style.transform = 'scale(1)';
                scoreText.style.color = '#FF8C00';
            }, 200);
        }

        // Add bubbles periodically
        setInterval(() => {
            if (document.getElementById('start-overlay').style.display !== 'none') return;
            // maintain around 10-15 bubbles max
            if (bubbles.length < 15) {
                bubbles.push(new Bubble());
            }
        }, 800);

        function updateGame() {
            ctxGame.clearRect(0, 0, canvasGame.width, canvasGame.height);

            // Update & Draw Bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.update();
                b.draw(ctxGame);
                if (b.popped) {
                    bubbles.splice(i, 1);
                }
            }

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(ctxGame);
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(updateGame);
        }

        // --- 4. Hand Tracking Logic ---
        function onResults(results) {
            ctxOutput.save();
            ctxOutput.clearRect(0, 0, w, h);

            // Draw camera feed (flipped via CSS)
            ctxOutput.drawImage(results.image, 0, 0, w, h);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Loop through hands
                for (const landmarks of results.multiHandLandmarks) {
                    // drawConnectors(ctxOutput, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 5 });
                    // drawLandmarks(ctxOutput, landmarks, { color: '#FF0000', lineWidth: 2, radius: 5 });

                    // We will just draw a cute "Magic Wand" spark on index finger
                    const indexFinger = landmarks[8];

                    // Note: Coordinates from mediapipe are normalized (0-1).
                    // We need to map them to canvas size.
                    // Important: The video/canvasOutput is flipped via CSS `transform: scaleX(-1)`.
                    // To map correctly to `canvasGame` WHICH IS NOT FLIPPED, we reverse the X coordinate.
                    const pointerX = (1 - indexFinger.x) * w;
                    const pointerY = indexFinger.y * h;

                    // Draw sparkling star on finger tip
                    ctxOutput.beginPath();
                    ctxOutput.arc(indexFinger.x * w, indexFinger.y * h, 15, 0, 2 * Math.PI);
                    ctxOutput.fillStyle = "rgba(255, 215, 0, 0.7)";
                    ctxOutput.fill();
                    ctxOutput.lineWidth = 3;
                    ctxOutput.strokeStyle = "#fff";
                    ctxOutput.stroke();

                    // Collision Detection with Bubbles
                    for (let i = 0; i < bubbles.length; i++) {
                        const b = bubbles[i];
                        if (b.popped) continue;

                        const dx = pointerX - b.x;
                        const dy = pointerY - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < b.radius + 10) { // +10 leniency
                            b.popped = true;
                            createExplosion(b.x, b.y, b.color);
                        }
                    }
                }
            }
            ctxOutput.restore();
        }

        // --- 4b. Touch & Mouse Logic ---
        function handleInteraction(clientX, clientY) {
            for (let i = 0; i < bubbles.length; i++) {
                const b = bubbles[i];
                if (b.popped) continue;

                const dx = clientX - b.x;
                const dy = clientY - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < b.radius + 15) { // +15 leniency
                    b.popped = true;
                    createExplosion(b.x, b.y, b.color);
                }
            }
        }

        // Tangkap event touch/click pada layar (z-index 10 paling atas)
        const uiLayer = document.querySelector('.ui-layer');
        uiLayer.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return; // abaikan tombol start 
            handleInteraction(e.clientX, e.clientY);
        });

        uiLayer.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            // loop through all touches
            for (let i = 0; i < e.changedTouches.length; i++) {
                handleInteraction(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            }
        }, { passive: false });

        // --- 5. Start Game Flow ---
        const startBtn = document.getElementById('start-btn');
        const loader = document.getElementById('loader');

        startBtn.addEventListener('click', async () => {
            initAudio(); // must happen inside user interaction

            startBtn.style.display = 'none';
            loader.style.display = 'flex';

            // Start MediaPipe
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            hands.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });

            try {
                await camera.start();
                // Hide overlay, start loop
                document.getElementById('start-overlay').style.display = 'none';
                updateGame();
            } catch (err) {
                document.getElementById('loader-status').innerText = "Oops, gagal akses kamera. " + err.message;
            }
        });

    </script>
</body>

</html>
