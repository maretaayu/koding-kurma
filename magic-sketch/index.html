<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Sketch — AI Drawing Guesser</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            display: none;
        }

        #output {
            position: absolute;
            transform: scaleX(-1);
            object-fit: cover;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #drawing {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo span {
            color: #facc15;
        }

        .instructions {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #facc15;
        }

        .instructions ul {
            list-style: none;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .instructions li {
            display: flex;
            gap: 10px;
        }

        .instructions li span {
            font-size: 1.2rem;
        }

        .color-palette {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-btn.active {
            border-color: #fff;
            transform: scale(1.2);
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .loader {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #facc15;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .actions {
            pointer-events: auto;
            text-align: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px 30px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .guess-panel {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(250, 204, 21, 0.5);
            border-radius: 20px;
            padding: 25px 50px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .guess-panel.show {
            opacity: 1;
        }

        .guess-label {
            font-size: 0.85rem;
            color: #facc15;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .guess-main {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .guess-sub {
            font-size: 1.2rem;
            color: #9ca3af;
            text-transform: capitalize;
        }
    </style>
</head>

<body>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <h2 id="loader-status">Waking up AI Vision...</h2>
        <p style="color: #888; margin-top: 10px; font-size: 0.9rem;" id="loader-sub">Downloading zero-shot model once...
        </p>
    </div>

    <video id="video" autoplay playsinline></video>

    <div class="camera-container">
        <canvas id="output"></canvas>
        <canvas id="drawing"></canvas>
    </div>

    <div class="overlay-ui">
        <div class="top-bar">
            <div class="logo">Magic<span>Sketch</span> 🎨</div>
            <div>
                <div class="instructions">
                    <h3>Gestures</h3>
                    <ul>
                        <li><span>☝️</span> 1 Finger = Draw Shape</li>
                        <li><span>✌️</span> 2 Fingers = Stop Drawing</li>
                        <li><span>🖐️</span> 5 Fingers = Clear Canvas</li>
                    </ul>
                </div>
                <div class="color-palette">
                    <button class="color-btn active" style="background:#000000" data-color="#000000"></button>
                    <button class="color-btn" style="background:#ef4444" data-color="#ef4444"></button>
                    <button class="color-btn" style="background:#3b82f6" data-color="#3b82f6"></button>
                    <button class="color-btn" style="background:#10b981" data-color="#10b981"></button>
                    <button class="color-btn" style="background:#f59e0b" data-color="#f59e0b"></button>
                </div>
            </div>
        </div>

        <div class="guess-panel" id="guess-panel">
            <div class="guess-label">AI is guessing...</div>
            <div class="guess-main" id="guess-main">--</div>
            <div class="guess-sub" id="guess-sub"></div>
        </div>

        <div class="actions">
            <button class="btn" id="btn-clear">🗑️ Clear Canvas</button>
        </div>
    </div>

    <script type="module">
        // Using HuggingFace Transformers.js for state-of-the-art zero shot image classification
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        env.allowLocalModels = false;

        const videoElement = document.getElementById('video');
        const canvasOutput = document.getElementById('output');
        const ctxOutput = canvasOutput.getContext('2d');
        const canvasDraw = document.getElementById('drawing');
        const ctxDraw = canvasDraw.getContext('2d', { willReadFrequently: true });

        let pWidth = 0, pHeight = 0;
        let lastX = null, lastY = null;
        let isDrawing = false;

        let aiClassifier = null;
        let guessTimer = null;
        let hasNewStrokes = false;
        let isGuessing = false;

        let DRAW_COLOR = "#000000";
        const DRAW_WIDTH = 25;

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                DRAW_COLOR = e.target.getAttribute('data-color');
            });
        });

        function resize() {
            pWidth = window.innerWidth;
            pHeight = window.innerHeight;
            canvasOutput.width = pWidth; canvasOutput.height = pHeight;
            canvasDraw.width = pWidth; canvasDraw.height = pHeight;
            ctxDraw.clearRect(0, 0, pWidth, pHeight);
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. Mediapipe setup
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 1280, height: 720
        });

        // 2. Load Deep Learning Vision AI (Transformers.js CLIP Model)
        (async () => {
            try {
                document.getElementById('loader-status').innerText = 'Starting Camera...';
                await camera.start();

                document.getElementById('loader-status').innerText = 'Loading Vision AI...';

                // Downloads CLIP zero-shot model directly into browser cache
                aiClassifier = await pipeline('zero-shot-image-classification', 'Xenova/clip-vit-base-patch32', {
                    progress_callback: (x) => {
                        if (x.status === 'downloading') {
                            const pct = x.progress ? Math.round(x.progress) : 0;
                            document.getElementById('loader-status').innerText = `Downloading Brain...`;
                            document.getElementById('loader-sub').innerText = `Fetching neural networks (${x.file}...)`;
                        } else if (x.status === 'ready') {
                            document.getElementById('loader-status').innerText = `Initializing...`;
                        }
                    }
                });

                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                document.getElementById('loader-status').innerText = 'Error: ' + err.message;
            }
        })();

        // 3. Hand tracking logic
        function isFingerUp(landmarks, tipIndex, pipIndex) { return landmarks[tipIndex].y < landmarks[pipIndex].y; }

        function onResults(results) {
            ctxOutput.save();
            ctxOutput.clearRect(0, 0, pWidth, pHeight);
            ctxOutput.drawImage(results.image, 0, 0, pWidth, pHeight);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                drawConnectors(ctxOutput, landmarks, HAND_CONNECTIONS, { color: '#fde047', lineWidth: 2 });
                drawLandmarks(ctxOutput, landmarks, { color: '#fff', lineWidth: 1, radius: 3 });

                const indexUp = isFingerUp(landmarks, 8, 6);
                const middleUp = isFingerUp(landmarks, 12, 10);
                const ringUp = isFingerUp(landmarks, 16, 14);
                const pinkyUp = isFingerUp(landmarks, 20, 18);

                const x = landmarks[8].x * pWidth;
                const y = landmarks[8].y * pHeight;

                let activeAction = false;

                // 🖐️ Clear
                if (indexUp && middleUp && ringUp && pinkyUp) {
                    clearCanvas();
                    isDrawing = false;
                    lastX = null; lastY = null;
                    activeAction = true;
                }
                // ☝️ Draw
                else if (indexUp && !middleUp && !ringUp && !pinkyUp) {
                    activeAction = true;
                    hasNewStrokes = true;
                    if (!isDrawing) { isDrawing = true; lastX = x; lastY = y; }

                    ctxDraw.beginPath();
                    ctxDraw.moveTo(lastX, lastY);
                    ctxDraw.lineTo(x, y);
                    ctxDraw.strokeStyle = DRAW_COLOR;
                    ctxDraw.lineWidth = DRAW_WIDTH;
                    ctxDraw.lineCap = "round";
                    ctxDraw.lineJoin = "round";
                    ctxDraw.stroke();

                    lastX = x; lastY = y;

                    // Glow
                    ctxOutput.beginPath();
                    ctxOutput.arc(x, y, 10, 0, 2 * Math.PI);
                    ctxOutput.fillStyle = DRAW_COLOR;
                    ctxOutput.fill();
                } else {
                    isDrawing = false;
                    lastX = null; lastY = null;
                }

                if (activeAction) {
                    clearTimeout(guessTimer);
                    guessTimer = null;
                } else if (hasNewStrokes && !isGuessing && !guessTimer) {
                    guessTimer = setTimeout(triggerAIGuess, 1500);
                }

            } else {
                isDrawing = false;
                lastX = null; lastY = null;
                if (hasNewStrokes && !isGuessing && !guessTimer) {
                    guessTimer = setTimeout(triggerAIGuess, 1500);
                }
            }
            ctxOutput.restore();
        }

        // 4. Object Detection Logic
        const guessPanel = document.getElementById('guess-panel');
        const mainEl = document.getElementById('guess-main');
        const subEl = document.getElementById('guess-sub');

        // Vast array of things a user might doodle
        const SKETCH_CLASSES = [
            'flower', 'tree', 'house', 'car', 'cat', 'dog', 'apple', 'sun', 'star',
            'person', 'smiley face', 'boat', 'airplane', 'bird', 'fish', 'sword',
            'cloud', 'lightning', 'heart', 'cup', 'book', 'chair', 'table', 'moon',
            'mountain', 'bicycle', 'banana'
        ];

        const clipLabels = SKETCH_CLASSES.map(l => `a drawing of a ${l}`);

        async function triggerAIGuess() {
            if (!aiClassifier || isGuessing || !hasNewStrokes) return;
            isGuessing = true;
            hasNewStrokes = false;

            guessPanel.classList.add('show');
            document.querySelector('.guess-label').innerText = 'AI is looking...';
            mainEl.innerText = "🤔";
            subEl.innerText = "Analyzing shape...";

            try {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 300;
                tempCanvas.height = 300;
                const tx = tempCanvas.getContext('2d');

                // Solid white background for drawings
                tx.fillStyle = '#ffffff';
                tx.fillRect(0, 0, 300, 300);

                const bounds = getDrawingBounds(ctxDraw, pWidth, pHeight);

                if (bounds) {
                    tx.translate(300, 0);
                    tx.scale(-1, 1);

                    const bW = bounds.maxX - bounds.minX;
                    const bH = bounds.maxY - bounds.minY;
                    const bSize = Math.max(bW, bH);
                    const scale = 250 / bSize;

                    const offsetX = (300 - (bW * scale)) / 2;
                    const offsetY = (300 - (bH * scale)) / 2;

                    tx.drawImage(canvasDraw,
                        bounds.minX - 20, bounds.minY - 20, bW + 40, bH + 40,
                        offsetX, offsetY, (bW + 40) * scale, (bH + 40) * scale
                    );

                    const dataUrl = tempCanvas.toDataURL('image/jpeg');

                    // Predict using zero-shot classification
                    const predictions = await aiClassifier(dataUrl, clipLabels);

                    if (predictions && predictions.length > 0) {
                        document.querySelector('.guess-label').innerText = 'I see a...';

                        let topLabel = predictions[0].label.replace('a drawing of a ', '');
                        let topScore = Math.round(predictions[0].score * 100);

                        let altLabel = predictions[1].label.replace('a drawing of a ', '');
                        let altScore = Math.round(predictions[1].score * 100);

                        mainEl.innerText = topLabel;
                        subEl.innerText = `Or maybe a ${altLabel}? (${topScore}% sure)`;
                    } else {
                        mainEl.innerText = "Confused";
                        subEl.innerText = "I don't recognize this shape";
                    }
                } else {
                    mainEl.innerText = "Too small";
                    subEl.innerText = "Draw a bit bigger";
                }

            } catch (e) { console.error(e); }

            isGuessing = false;
        }

        function getDrawingBounds(ctx, w, h) {
            const data = ctx.getImageData(0, 0, w, h).data;
            let minX = w, maxX = 0, minY = h, maxY = 0;
            let found = false;
            for (let y = 0; y < h; y += 4) {
                for (let x = 0; x < w; x += 4) {
                    const alpha = data[(y * w + x) * 4 + 3];
                    if (alpha > 10) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            if (!found || (maxX - minX < 20)) return null;
            return { minX, maxX, minY, maxY };
        }

        // Must attach event handlers this way inside un-bundled type="module" script 
        document.getElementById('btn-clear').addEventListener('click', clearCanvas);

        function clearCanvas() {
            ctxDraw.clearRect(0, 0, pWidth, pHeight);
            hasNewStrokes = false;
            clearTimeout(guessTimer);
            guessTimer = null;
            guessPanel.classList.remove('show');
        }

    </script>
</body>

</html>
